<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hive — Mind Mapping</title>
    <link rel="icon" type="image/png" href="src/images/hive_icon_transparent_square.png" />
    <link rel="stylesheet" href="src/styles/themes.css" />
    <link rel="stylesheet" href="src/styles/app.css" />
  </head>
  <body>
    <header class="toolbar" role="toolbar" aria-label="Main toolbar">
      <div class="brand">
        <span class="logo" aria-hidden="true">🐝</span>
        <strong>Hive</strong>
      </div>

      <div class="group">
        <button data-cmd="new" title="New (Ctrl+N)" aria-label="New">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9zM14 3v6h6"/></svg>
          <span>New</span>
        </button>
        <button data-cmd="open" title="Open (Ctrl+O)" aria-label="Open">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          <span>Open</span>
        </button>
        <button data-cmd="sample" title="Load welcome sample" aria-label="Sample">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Sample</span>
        </button>
        <button data-cmd="save" title="Save (Ctrl+S)" aria-label="Save">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M5 3h11l3 3v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zM7 3v6h8V3M7 21v-7h10v7"/></svg>
          <span>Save</span>
        </button>
        <button data-cmd="save-as" title="Save As (Ctrl+Shift+S)" aria-label="Save As">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M5 3h11l3 3v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zM7 3v6h8V3"/><path d="M16 17l3-3M19 14h-3v3"/></svg>
          <span>Save As</span>
        </button>
      </div>

      <div class="group">
        <button data-cmd="add-child" title="Add child (Tab)" aria-label="Add child">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="6" r="2.5"/><circle cx="18" cy="18" r="2.5"/><path d="M8.2 11l7.6-4M8.2 13l7.6 4"/><path d="M21 12h-4M19 10v4" stroke-width="1.7"/></svg>
          <span>Child</span>
        </button>
        <button data-cmd="add-sibling" title="Add sibling (Enter)" aria-label="Add sibling">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="12" r="2.5"/><path d="M8.5 12h7"/><path d="M21 8v4M23 10h-4" stroke-width="1.7"/></svg>
          <span>Sibling</span>
        </button>
        <button data-cmd="delete" title="Delete (Del)" aria-label="Delete">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 7h16M9 7V4h6v3M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13M10 11v7M14 11v7"/></svg>
          <span>Delete</span>
        </button>
        <button data-cmd="undo" title="Undo (Ctrl+Z)" aria-label="Undo">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 14l-5-5 5-5"/><path d="M4 9h11a5 5 0 1 1 0 10h-4"/></svg>
          <span>Undo</span>
        </button>
        <button data-cmd="redo" title="Redo (Ctrl+Y)" aria-label="Redo">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a5 5 0 1 0 0 10h4"/></svg>
          <span>Redo</span>
        </button>
      </div>

      <div class="group">
        <label for="layout-select">Layout</label>
        <select id="layout-select" data-cmd="layout">
          <option value="radial">Radial</option>
          <option value="tree-h">Tree (horizontal)</option>
          <option value="tree-v">Tree (vertical)</option>
          <option value="free">Free</option>
        </select>
        <button data-cmd="auto-align" title="Auto-align now (A)" aria-label="Auto-align">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="2.5"/><circle cx="4" cy="6" r="2"/><circle cx="4" cy="18" r="2"/><circle cx="20" cy="6" r="2"/><circle cx="20" cy="18" r="2"/><path d="M10 11l-5-4M10 13l-5 4M14 11l5-4M14 13l5 4"/></svg>
          <span>Align</span>
        </button>
      </div>

      <div class="group">
        <label for="theme-select">Theme</label>
        <select id="theme-select" data-cmd="theme">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="sepia">Sepia</option>
          <option value="contrast">High contrast</option>
          <option value="aqua">Aqua</option>
          <option value="prague">Prague</option>
        </select>
      </div>

      <div class="group right">
        <button data-cmd="zoom-out" title="Zoom out" aria-label="Zoom out">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="11" cy="11" r="6"/><path d="M20 20l-4.5-4.5M8 11h6"/></svg>
        </button>
        <button data-cmd="zoom-reset" title="Reset zoom" aria-label="Reset zoom">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="11" cy="11" r="6"/><path d="M20 20l-4.5-4.5"/><text x="11" y="14" text-anchor="middle" font-size="8" fill="currentColor" stroke="none">1:1</text></svg>
        </button>
        <button data-cmd="zoom-in" title="Zoom in" aria-label="Zoom in">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="11" cy="11" r="6"/><path d="M20 20l-4.5-4.5M8 11h6M11 8v6"/></svg>
        </button>
        <button data-cmd="fit" title="Fit to screen (F)" aria-label="Fit">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
        </button>
      </div>
    </header>

    <main class="canvas-wrap" id="canvas-wrap" tabindex="0" aria-label="Mind map canvas">
      <svg class="connectors" id="connectors" aria-hidden="true"></svg>
      <div class="nodes" id="nodes"></div>
      <div class="hint" id="hint">
        Click a node to select. <kbd>Tab</kbd> add child, <kbd>Enter</kbd> sibling,
        <kbd>F2</kbd> rename, <kbd>Del</kbd> delete, drag to reparent, scroll to zoom.
      </div>
    </main>

    <footer class="statusbar">
      <span id="status">Ready</span>
    </footer>

    <input type="file" id="file-input" accept=".hmap.json,application/json" hidden />

    <div class="context-menu" id="context-menu" role="menu" hidden></div>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
