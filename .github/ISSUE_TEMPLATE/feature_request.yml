name: Feature request
description: Suggest an enhancement for Hive
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What user need or pain point does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Rendering / canvas
        - Drag and drop
        - Themes
        - Auto-alignment / layout
        - File format / IO
        - Accessibility
        - Other
    validations:
      required: true
