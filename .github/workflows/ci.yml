name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check HTML / JSON syntax
        run: |
          # Fail fast if any JSON sample is malformed
          find . -type f -name '*.json' -not -path './node_modules/*' \
            -exec node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" {} \;

      - name: Install (if package.json present)
        run: |
          if [ -f package.json ]; then npm ci || npm install; fi

      - name: Run tests (if defined)
        run: |
          if [ -f package.json ] && node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts.test ? 0 : 1)"; then
            npm test --if-present
          else
            echo "No tests defined yet."
          fi
